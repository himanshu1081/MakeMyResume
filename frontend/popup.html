<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>MakeMyResume</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 350px;
      padding: 12px;
      box-sizing: border-box;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    textarea {
      width: 100%;
      height: 150px;
      resize: none;
      padding: 8px;
      font-size: 13px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background-color: black;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      opacity: 0.9;
    }

    #status {
      margin-top: 8px;
      font-size: 12px;
      color: green;
    }

    .resume-upload {
      width: 100%;
      align-items: center;
      justify-content: center;
      flex: auto;
      flex-direction: column;
      background-color: aqua;
      padding: 90px;
    }
  </style>
</head>

<body>

  <div>
    <h2>MakeMyResume</h2>
    <h6>By Himanshu Chaudhary</h6>
  </div>

  <input type="file" class="resume-upload">
  <div>
    Upload your old resume here.
  </div>
  </input>

  <textarea id="jdInput" placeholder="Paste Job Description here..."></textarea>

  <button id="generateBtn">Generate Resume</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
