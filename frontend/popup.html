<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=upload_file" />
  <link rel="stylesheet" href="dist/output.css">
  <title>MakeMyResume</title>
</head>

<body class="w-[350px] p-3 box-border font-sans bg-white">

  <div class="mb-3">
    <h2 class="text-lg font-semibold">MakeMyResume</h2>
    <h6 class="text-xs text-gray-500">By Himanshu Chaudhary</h6>
  </div>

  <p class="text-sm mb-2">Upload your old resume here.</p>

  <div>
    <input type="file" id="pdfinput" accept="application/pdf"  style="display:none">
    <div id="pdfInputUi" class="flex flex-col gap-2 w-full h-20 bg-amber-300">
      <span class="material-symbols-outlined">
        upload_file
      </span>
      <span id="resumeText">
        Upload File here
      </span>
    </div>
  </div>
  <textarea id="jdInput" placeholder="Paste Job Description here..."
    class="w-full h-[150px] mt-3 p-2 text-sm border border-gray-300 rounded-md resize-none focus:outline-none focus:ring-2 focus:ring-black">
  </textarea>

  <button id="generateBtn"
    class="w-full mt-3 py-2 bg-black text-white rounded-md font-semibold hover:opacity-90 transition cursor-pointer">
    Generate Resume
  </button>

  <div id="status" class="mt-2 text-xs text-green-600"></div>

  <script src="popup.js"></script>

</body>

</html>
